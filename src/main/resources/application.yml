server:
  port: 9999
  servlet:
    context-path: /digest

spring:
  # Database configuration
  datasource:
    url: jdbc:mysql://localhost:3306/digest
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Hibernate configuration
  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
      format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

#Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

